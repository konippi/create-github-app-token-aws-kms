version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 1
    groups:
      production:
        dependency-type: production
        update-types:
          - patch
      development:
        dependency-type: development
        update-types:
          - minor
          - patch
